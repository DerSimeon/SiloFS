name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v, for example 0.15.1
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.event.workflow_run.head_branch || github.ref_name || github.run_id }}
  cancel-in-progress: false

env:
  CLOUDSMITH_ENABLED: ${{ secrets.CLOUDSMITH_API_KEY != '' && secrets.CLOUDSMITH_OWNER != '' && secrets.CLOUDSMITH_REPO != '' }}

jobs:
  release:
    name: Build and publish release artifacts
    runs-on: ubuntu-24.04
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - name: Normalize image name
        id: image
        run: |
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/silofs" >> "$GITHUB_OUTPUT"

      - name: Derive version
        id: version
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$DISPATCH_VERSION"
          else
            VERSION="$(tr -d '[:space:]' < VERSION)"
          fi
          case "$VERSION" in
            v*) VERSION="${VERSION#v}" ;;
          esac
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+[.][0-9]+[.][0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Invalid release version: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether this version should publish
        id: publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Release v${{ steps.version.outputs.version }} already exists; skipping publish."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build CLI binaries in pinned Go container
        if: steps.publish.outputs.enabled == 'true'
        run: |
          mkdir -p dist/bin dist/pkg
          for arch in amd64 arm64; do
            docker run --rm \
              -v "$PWD/cli:/src" \
              -v "$PWD/dist/bin:/out" \
              -w /src \
              golang:1.23.5-bookworm \
              sh -c "gofmt -w main.go main_test.go && go test ./... && CGO_ENABLED=0 GOOS=linux GOARCH=$arch go build -trimpath -ldflags '-s -w -X main.version=${{ steps.version.outputs.version }}' -o /out/silofs-linux-$arch ."
          done

      - name: Build Debian packages
        if: steps.publish.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          for arch in amd64 arm64; do
            root="dist/pkg/silofs_${{ steps.version.outputs.version }}_${arch}"
            mkdir -p "$root/DEBIAN" "$root/usr/bin"
            cp "dist/bin/silofs-linux-$arch" "$root/usr/bin/silofs"
            chmod 0755 "$root/usr/bin/silofs"
            {
              printf 'Package: silofs\n'
              printf 'Version: %s\n' '${{ steps.version.outputs.version }}'
              printf 'Section: utils\n'
              printf 'Priority: optional\n'
              printf 'Architecture: %s\n' "$arch"
              printf 'Maintainer: SiloFS Maintainers <noreply@github.com>\n'
              printf 'License: Apache-2.0\n'
              printf 'Homepage: https://github.com/${{ github.repository }}\n'
              printf 'Description: Standalone CLI for SiloFS object storage\n'
              printf ' SiloFS is a single-node S3-compatible object storage server.\n'
              printf ' This package installs the standalone silofs CLI.\n'
            } > "$root/DEBIAN/control"
            dpkg-deb --build "$root" "dist/silofs_${{ steps.version.outputs.version }}_${arch}.deb"
          done

      - name: Generate checksums
        if: steps.publish.outputs.enabled == 'true'
        run: |
          cd dist
          sha256sum -- bin/* ./*.deb > checksums.txt

      - name: Log in to GHCR
        if: steps.publish.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        if: steps.publish.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.name }}:latest

      - name: Publish GitHub release
        if: steps.publish.outputs.enabled == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.event.workflow_run.head_sha || github.sha }}
          generate_release_notes: true
          files: |
            dist/bin/silofs-linux-amd64
            dist/bin/silofs-linux-arm64
            dist/silofs_${{ steps.version.outputs.version }}_amd64.deb
            dist/silofs_${{ steps.version.outputs.version }}_arm64.deb
            dist/checksums.txt

      - name: Publish Debian packages to Cloudsmith
        if: steps.publish.outputs.enabled == 'true' && env.CLOUDSMITH_ENABLED == 'true'
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          CLOUDSMITH_OWNER: ${{ secrets.CLOUDSMITH_OWNER }}
          CLOUDSMITH_REPO: ${{ secrets.CLOUDSMITH_REPO }}
        run: |
          python3 -m pip install --user cloudsmith-cli
          "$HOME/.local/bin/cloudsmith" push deb "$CLOUDSMITH_OWNER/$CLOUDSMITH_REPO/any-distro/any-version" dist/*.deb
