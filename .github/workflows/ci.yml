name: CI

on:
  pull_request:
  pull_request_review:
    types:
      - submitted
  push:
    branches:
      - main

jobs:
  version-bump:
    name: Version bump
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require VERSION bump for releaseable changes
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+[.][0-9]+[.][0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "VERSION must be semantic, for example 0.15.1" >&2
            exit 1
          fi
          git fetch origin main
          changed="$(git diff --name-only origin/main...HEAD)"
          releaseable="$(printf '%s\n' "$changed" | grep -Ev '^(docs/|assets/|README[.]md$|LICENSE$|VERSION$)' || true)"
          if [ -z "$releaseable" ]; then
            echo "Only docs/assets/license/VERSION changed; VERSION bump is optional."
            exit 0
          fi
          base_version="$(git show origin/main:VERSION 2>/dev/null | tr -d '[:space:]' || true)"
          if [ -z "$base_version" ]; then
            echo "VERSION is new; accepting $VERSION."
            exit 0
          fi
          if [ "$VERSION" = "$base_version" ]; then
            echo "Releaseable changes require bumping VERSION. Current VERSION=$VERSION." >&2
            exit 1
          fi
          higher="$(printf '%s\n%s\n' "$base_version" "$VERSION" | sort -V | tail -n1)"
          if [ "$higher" != "$VERSION" ]; then
            echo "VERSION must increase. base=$base_version pr=$VERSION" >&2
            exit 1
          fi

  jvm-module-tests:
    name: JVM module tests
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request_review'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Run module tests
        run: ./gradlew :metadata:test :blob:test :server:test ktlintCheck -x detekt --no-parallel --max-workers=1

  docker-backed-tests:
    name: Docker-backed S3 and compatibility tests
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' || (github.event_name == 'pull_request_review' && github.event.review.state == 'approved')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Run Docker-backed verification
        run: ./gradlew :integration-test:test :compatibility-test:test dockerBackedVerification -x detekt --no-parallel --max-workers=1

  go-cli:
    name: Go CLI tests and Linux binary
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request_review'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Test and build CLI in pinned Go container
        run: >
          docker run --rm
          -v "$PWD/cli:/src"
          -w /src
          golang:1.23.5-bookworm
          sh -c "go test ./... && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags '-s -w' -o /tmp/silofs . && /tmp/silofs version"

  production-verification:
    name: Locked production verification
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' || (github.event_name == 'pull_request_review' && github.event.review.state == 'approved')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Run locked production verification
        run: sh scripts/verify-production.sh --skip-go
